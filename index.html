<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>剪纸窗花</title>
  <style>
    :root {
      --paper: #d73131;
      --paper-dark: #9f1717;
      --ink: #2e1c18;
      --muted: #7a6660;
      --gold: #f3bd48;
      --jade: #0f8b7a;
      --bg: #fffaf0;
      --panel: #fffdf8;
      --line: rgba(92, 48, 38, 0.16);
      --shadow: 0 22px 55px rgba(99, 25, 20, 0.17);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Serif SC", "Microsoft YaHei", "PingFang SC", serif;
      color: var(--ink);
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.78), rgba(255, 250, 240, 0.78)),
        radial-gradient(circle at 14px 14px, rgba(215, 49, 49, 0.1) 2px, transparent 2px);
      background-size: auto, 28px 28px;
    }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 0 20px;
    }

    h1 {
      margin: 0;
      color: var(--paper-dark);
      font-size: clamp(2rem, 5vw, 4.3rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .status {
      max-width: 360px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--muted);
      font-size: 0.92rem;
      text-align: right;
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 680px) minmax(280px, 1fr);
      gap: 22px;
      align-items: start;
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      border: 1px solid rgba(159, 23, 23, 0.18);
      border-radius: 8px;
      background:
        linear-gradient(45deg, rgba(255, 255, 255, 0.7), rgba(255, 249, 234, 0.72)),
        radial-gradient(circle at center, rgba(243, 189, 72, 0.16), transparent 58%);
      box-shadow: var(--shadow);
      touch-action: none;
    }

    canvas,
    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #paperCanvas {
      cursor: crosshair;
      z-index: 2;
    }

    #overlayCanvas {
      z-index: 3;
      pointer-events: none;
    }

    #webcam {
      opacity: 0;
      pointer-events: none;
      transform: scaleX(-1);
    }

    .badge {
      position: absolute;
      z-index: 4;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      width: max-content;
      max-width: calc(100% - 28px);
      padding: 8px 13px;
      border-radius: 8px;
      background: rgba(15, 139, 122, 0.92);
      color: #fff;
      font-size: 0.9rem;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.12);
    }

    .side {
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.88);
      padding: 16px;
      box-shadow: 0 12px 30px rgba(91, 49, 39, 0.08);
    }

    .panel h2 {
      margin: 0 0 13px;
      color: var(--paper-dark);
      font-size: 1.05rem;
      letter-spacing: 0;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      color: var(--muted);
      font-size: 0.94rem;
    }

    select,
    input[type="range"] {
      width: 100%;
    }

    select {
      padding: 9px 10px;
      border: 1px solid rgba(159, 23, 23, 0.28);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      font: inherit;
    }

    input[type="range"] {
      accent-color: var(--paper);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      background: var(--paper);
      color: white;
      box-shadow: 0 10px 18px rgba(215, 49, 49, 0.2);
    }

    .primary:hover {
      background: var(--paper-dark);
    }

    .secondary {
      background: white;
      color: var(--paper-dark);
      border-color: rgba(159, 23, 23, 0.3);
    }

    .secondary:hover {
      background: #fff1ec;
    }

    .ghost {
      background: rgba(15, 139, 122, 0.1);
      color: var(--jade);
      border-color: rgba(15, 139, 122, 0.24);
    }

    .history {
      display: flex;
      gap: 10px;
      min-height: 88px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .empty {
      width: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 0.9rem;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    .thumb {
      position: relative;
      flex: 0 0 78px;
      width: 78px;
      height: 78px;
      padding: 0;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: 8px;
      background: white;
    }

    .thumb.active {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(243, 189, 72, 0.35);
    }

    .thumb canvas {
      display: block;
      position: static;
      width: 100%;
      height: 100%;
    }

    .delete {
      position: absolute;
      top: 4px;
      right: 4px;
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      min-height: 0;
      padding: 0;
      border-radius: 999px;
      background: rgba(46, 28, 24, 0.78);
      color: white;
      font-size: 14px;
      line-height: 1;
    }

    .tips {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .tips p {
      margin: 0;
    }

    @media (max-width: 880px) {
      header,
      main {
        display: grid;
        grid-template-columns: 1fr;
      }

      .status {
        max-width: none;
        text-align: left;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 14px;
      }

      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>剪纸窗花</h1>
        <p class="subtitle">拖动鼠标或手指剪出对称纹样，展开后可保存作品。</p>
      </div>
      <div class="status">当前是鼠标/触控模式。手势模式需要摄像头权限和网络模型。</div>
    </header>

    <main>
      <section class="stage" aria-label="剪纸画布">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="paperCanvas"></canvas>
        <canvas id="overlayCanvas"></canvas>
        <div id="feedback" class="badge">鼠标/触控模式：按住并拖动开始剪纸</div>
      </section>

      <aside class="side">
        <section class="panel">
          <h2>工具</h2>
          <div class="field">
            <label for="foldCount">折叠次数</label>
            <select id="foldCount">
              <option value="4">4 折</option>
              <option value="6">6 折</option>
              <option value="8" selected>8 折</option>
              <option value="12">12 折</option>
              <option value="16">16 折</option>
            </select>
          </div>
          <div class="field">
            <label for="brushSize">剪刀大小：<span id="brushValue">20</span> px</label>
            <input id="brushSize" type="range" min="5" max="54" step="1" value="20" />
          </div>
          <div class="button-row">
            <button id="toggleView" class="primary">展开作品</button>
            <button id="reset" class="secondary">重新开始</button>
            <button id="saveImage" class="secondary">保存图片</button>
            <button id="toggleGesture" class="ghost">手势模式</button>
          </div>
        </section>

        <section class="panel">
          <h2>历史记录</h2>
          <div id="history" class="history"></div>
          <div class="button-row">
            <button id="saveState" class="secondary">保存当前状态</button>
            <button id="clearHistory" class="secondary">清空历史</button>
          </div>
        </section>

        <section class="panel tips">
          <p>建议先用鼠标或触控绘制，满意后点“展开作品”查看干净效果。</p>
          <p>上传到 GitHub Pages 后，手势模式会在 HTTPS 页面中请求摄像头权限。</p>
        </section>
      </aside>
    </main>
  </div>

  <script type="module">
    const paperCanvas = document.getElementById("paperCanvas");
    const overlayCanvas = document.getElementById("overlayCanvas");
    const video = document.getElementById("webcam");
    const feedback = document.getElementById("feedback");
    const paperCtx = paperCanvas.getContext("2d");
    const overlayCtx = overlayCanvas.getContext("2d");

    const state = {
      width: 600,
      height: 600,
      foldCount: 8,
      brushSize: 20,
      unfolded: false,
      cutting: false,
      last: null,
      history: [],
      historyIndex: -1,
      gestureEnabled: false,
      handLandmarker: null,
      cursor: { x: 300, y: 300 },
      target: { x: 300, y: 300 },
      maskCanvas: document.createElement("canvas")
    };

    const maskCtx = state.maskCanvas.getContext("2d");

    function resizeCanvas() {
      const size = Math.round(paperCanvas.getBoundingClientRect().width);
      const oldMask = document.createElement("canvas");
      oldMask.width = state.maskCanvas.width || size;
      oldMask.height = state.maskCanvas.height || size;
      oldMask.getContext("2d").drawImage(state.maskCanvas, 0, 0);

      state.width = size;
      state.height = size;
      for (const canvas of [paperCanvas, overlayCanvas, state.maskCanvas]) {
        canvas.width = size;
        canvas.height = size;
      }

      if (oldMask.width && oldMask.height) {
        maskCtx.drawImage(oldMask, 0, 0, size, size);
      }
      render();
    }

    function render() {
      paperCtx.clearRect(0, 0, state.width, state.height);
      paperCtx.fillStyle = "#d73131";
      paperCtx.fillRect(0, 0, state.width, state.height);

      paperCtx.globalCompositeOperation = "destination-out";
      paperCtx.drawImage(state.maskCanvas, 0, 0);
      paperCtx.globalCompositeOperation = "source-over";

      addPaperTexture();
      if (!state.unfolded) drawGuides();
    }

    function addPaperTexture() {
      paperCtx.save();
      paperCtx.globalCompositeOperation = "source-atop";
      paperCtx.strokeStyle = "rgba(255,255,255,0.08)";
      paperCtx.lineWidth = 1;
      for (let y = 12; y < state.height; y += 18) {
        paperCtx.beginPath();
        paperCtx.moveTo(0, y);
        paperCtx.lineTo(state.width, y + Math.sin(y) * 6);
        paperCtx.stroke();
      }
      paperCtx.restore();
    }

    function drawGuides() {
      const cx = state.width / 2;
      const cy = state.height / 2;
      const radius = Math.max(state.width, state.height);
      const sectorAngle = (Math.PI * 2) / state.foldCount;

      paperCtx.save();
      paperCtx.strokeStyle = "rgba(255, 215, 0, 0.36)";
      paperCtx.lineWidth = 1;
      paperCtx.setLineDash([7, 7]);
      for (let i = 0; i < state.foldCount; i++) {
        paperCtx.beginPath();
        paperCtx.moveTo(cx, cy);
        paperCtx.lineTo(cx + Math.cos(i * sectorAngle) * radius, cy + Math.sin(i * sectorAngle) * radius);
        paperCtx.stroke();
      }
      paperCtx.restore();
    }

    function cutAt(x, y) {
      if (!state.cutting || !state.last) return;

      const cx = state.width / 2;
      const cy = state.height / 2;
      const sectorAngle = (Math.PI * 2) / state.foldCount;
      const dx1 = state.last.x - cx;
      const dy1 = state.last.y - cy;
      const dx2 = x - cx;
      const dy2 = y - cy;
      const r1 = Math.hypot(dx1, dy1);
      const r2 = Math.hypot(dx2, dy2);
      const t1 = Math.atan2(dy1, dx1);
      const t2 = Math.atan2(dy2, dx2);

      maskCtx.save();
      maskCtx.strokeStyle = "#000";
      maskCtx.lineWidth = state.brushSize;
      maskCtx.lineCap = "round";
      maskCtx.lineJoin = "round";

      for (let i = 0; i < state.foldCount; i++) {
        const angle = i * sectorAngle;
        drawCutLine(cx, cy, r1, r2, t1 + angle, t2 + angle);
        drawCutLine(cx, cy, r1, r2, -t1 + angle, -t2 + angle);
      }

      maskCtx.restore();
      state.last = { x, y };
      render();
    }

    function drawCutLine(cx, cy, r1, r2, a1, a2) {
      maskCtx.beginPath();
      maskCtx.moveTo(cx + Math.cos(a1) * r1, cy + Math.sin(a1) * r1);
      maskCtx.lineTo(cx + Math.cos(a2) * r2, cy + Math.sin(a2) * r2);
      maskCtx.stroke();
    }

    function pointFromEvent(event) {
      const rect = paperCanvas.getBoundingClientRect();
      const source = event.touches ? event.touches[0] : event;
      return {
        x: (source.clientX - rect.left) * (state.width / rect.width),
        y: (source.clientY - rect.top) * (state.height / rect.height)
      };
    }

    function startCut(point) {
      state.cutting = true;
      state.last = point;
      cutAt(point.x, point.y);
    }

    function endCut() {
      state.cutting = false;
      state.last = null;
    }

    function resetPaper() {
      maskCtx.clearRect(0, 0, state.width, state.height);
      state.unfolded = false;
      document.getElementById("toggleView").textContent = "展开作品";
      endCut();
      render();
    }

    function setFeedback(text, color = "rgba(15, 139, 122, 0.92)") {
      feedback.textContent = text;
      feedback.style.background = color;
    }

    function saveImage() {
      const clean = state.unfolded;
      if (!clean) {
        state.unfolded = true;
        render();
      }
      const link = document.createElement("a");
      link.download = `jianzhi-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-")}.png`;
      link.href = paperCanvas.toDataURL("image/png");
      link.click();
      if (!clean) {
        state.unfolded = false;
        render();
      }
    }

    function saveState() {
      const snapshot = document.createElement("canvas");
      snapshot.width = state.width;
      snapshot.height = state.height;
      snapshot.getContext("2d").drawImage(state.maskCanvas, 0, 0);
      state.history.push({
        mask: snapshot,
        foldCount: state.foldCount,
        brushSize: state.brushSize
      });
      state.historyIndex = state.history.length - 1;
      drawHistory();
    }

    function loadState(index) {
      const item = state.history[index];
      if (!item) return;
      maskCtx.clearRect(0, 0, state.width, state.height);
      maskCtx.drawImage(item.mask, 0, 0, state.width, state.height);
      state.foldCount = item.foldCount;
      state.brushSize = item.brushSize;
      state.historyIndex = index;
      document.getElementById("foldCount").value = String(item.foldCount);
      document.getElementById("brushSize").value = String(item.brushSize);
      document.getElementById("brushValue").textContent = item.brushSize;
      render();
      drawHistory();
    }

    function drawHistory() {
      const history = document.getElementById("history");
      history.innerHTML = "";
      if (!state.history.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "还没有保存的状态";
        history.appendChild(empty);
        return;
      }

      state.history.forEach((item, index) => {
        const button = document.createElement("button");
        button.className = `thumb${index === state.historyIndex ? " active" : ""}`;
        button.title = "载入这个状态";
        button.addEventListener("click", () => loadState(index));

        const preview = document.createElement("canvas");
        preview.width = 78;
        preview.height = 78;
        const previewCtx = preview.getContext("2d");
        previewCtx.fillStyle = "#d73131";
        previewCtx.fillRect(0, 0, 78, 78);
        previewCtx.globalCompositeOperation = "destination-out";
        previewCtx.drawImage(item.mask, 0, 0, 78, 78);
        previewCtx.globalCompositeOperation = "source-over";
        button.appendChild(preview);

        const del = document.createElement("span");
        del.className = "delete";
        del.textContent = "x";
        del.addEventListener("click", event => {
          event.stopPropagation();
          state.history.splice(index, 1);
          state.historyIndex = Math.min(state.historyIndex, state.history.length - 1);
          drawHistory();
        });
        button.appendChild(del);
        history.appendChild(button);
      });
    }

    function explainGestureError(error) {
      const message = String(error && (error.message || error.name) || error);
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        return "这个浏览器不支持摄像头访问。请用 Chrome/Edge 打开，或上传到 GitHub Pages 后再试。";
      }
      if (message.includes("Permission") || message.includes("NotAllowed")) {
        return "摄像头权限被拒绝了。请在浏览器地址栏允许摄像头，然后重新开启手势模式。";
      }
      if (message.includes("NotFound") || message.includes("DevicesNotFound")) {
        return "没有找到可用摄像头。请确认摄像头已连接且没有被其他软件占用。";
      }
      if (message.includes("Failed to fetch") || message.includes("Network") || message.includes("cdn") || message.includes("googleapis")) {
        return "AI 手势模型没有加载成功。手势模式需要联网；上传到 GitHub Pages 后再打开会更稳定。";
      }
      return "手势模式启动失败。请先用鼠标/触控模式，或上传到 GitHub Pages 后再试。";
    }

    async function createHandLandmarker(HandLandmarker, vision) {
      const options = delegate => ({
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate
        },
        runningMode: "VIDEO",
        numHands: 1
      });

      try {
        return await HandLandmarker.createFromOptions(vision, options("GPU"));
      } catch (error) {
        console.warn("GPU hand model failed, retrying with CPU.", error);
        return await HandLandmarker.createFromOptions(vision, options("CPU"));
      }
    }

    async function toggleGesture() {
      state.gestureEnabled = !state.gestureEnabled;
      const button = document.getElementById("toggleGesture");
      if (!state.gestureEnabled) {
        stopGesture();
        button.textContent = "手势模式";
        setFeedback("鼠标/触控模式：按住并拖动开始剪纸");
        return;
      }

      button.textContent = "关闭手势";
      setFeedback("正在加载手势识别模型...", "rgba(35, 93, 166, 0.9)");

      try {
        if (!state.handLandmarker) {
          const { FilesetResolver, HandLandmarker } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/+esm");
          const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm");
          state.handLandmarker = await createHandLandmarker(HandLandmarker, vision);
        }

        setFeedback("请允许摄像头权限...", "rgba(35, 93, 166, 0.9)");
        video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        await video.play();
        setFeedback("手势模式：捏合拇指和食指开始剪纸", "rgba(35, 93, 166, 0.9)");
        gestureLoop();
      } catch (error) {
        console.error(error);
        state.gestureEnabled = false;
        button.textContent = "手势模式";
        setFeedback(explainGestureError(error), "rgba(176, 43, 43, 0.92)");
      }
    }

    function stopGesture() {
      state.gestureEnabled = false;
      endCut();
      overlayCtx.clearRect(0, 0, state.width, state.height);
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
    }

    function gestureLoop() {
      if (!state.gestureEnabled || !state.handLandmarker) return;
      const results = state.handLandmarker.detectForVideo(video, Date.now());

      if (results.landmarks && results.landmarks[0]) {
        const hand = results.landmarks[0];
        const indexTip = hand[8];
        const thumbTip = hand[4];
        state.target.x = (1 - indexTip.x) * state.width;
        state.target.y = indexTip.y * state.height;
        state.cursor.x += (state.target.x - state.cursor.x) * 0.28;
        state.cursor.y += (state.target.y - state.cursor.y) * 0.28;

        const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
        const pinching = distance < 0.055;
        if (pinching) {
          if (!state.cutting) startCut({ x: state.cursor.x, y: state.cursor.y });
          cutAt(state.cursor.x, state.cursor.y);
          setFeedback("正在剪纸", "rgba(215, 49, 49, 0.92)");
        } else {
          endCut();
          setFeedback("移动手指，捏合开始剪纸", "rgba(35, 93, 166, 0.9)");
        }
        drawGestureCursor(state.cursor.x, state.cursor.y, pinching);
      } else {
        endCut();
        overlayCtx.clearRect(0, 0, state.width, state.height);
        setFeedback("没有检测到手，请把手放入摄像头画面", "rgba(35, 93, 166, 0.9)");
      }

      requestAnimationFrame(gestureLoop);
    }

    function drawGestureCursor(x, y, active) {
      overlayCtx.clearRect(0, 0, state.width, state.height);
      overlayCtx.beginPath();
      overlayCtx.arc(x, y, active ? 14 : 8, 0, Math.PI * 2);
      overlayCtx.fillStyle = active ? "#f3bd48" : "rgba(255,255,255,0.9)";
      overlayCtx.fill();
      overlayCtx.lineWidth = 2;
      overlayCtx.strokeStyle = active ? "#9f1717" : "#2e1c18";
      overlayCtx.stroke();
    }

    paperCanvas.addEventListener("pointerdown", event => {
      if (state.gestureEnabled) return;
      event.preventDefault();
      paperCanvas.setPointerCapture(event.pointerId);
      startCut(pointFromEvent(event));
    });

    paperCanvas.addEventListener("pointermove", event => {
      if (state.gestureEnabled || !state.cutting) return;
      event.preventDefault();
      const point = pointFromEvent(event);
      cutAt(point.x, point.y);
    });

    paperCanvas.addEventListener("pointerup", endCut);
    paperCanvas.addEventListener("pointercancel", endCut);
    paperCanvas.addEventListener("pointerleave", endCut);

    document.getElementById("foldCount").addEventListener("change", event => {
      state.foldCount = Number(event.target.value);
      render();
    });

    document.getElementById("brushSize").addEventListener("input", event => {
      state.brushSize = Number(event.target.value);
      document.getElementById("brushValue").textContent = state.brushSize;
    });

    document.getElementById("toggleView").addEventListener("click", event => {
      state.unfolded = !state.unfolded;
      event.currentTarget.textContent = state.unfolded ? "继续剪纸" : "展开作品";
      render();
    });

    document.getElementById("reset").addEventListener("click", resetPaper);
    document.getElementById("saveImage").addEventListener("click", saveImage);
    document.getElementById("saveState").addEventListener("click", saveState);
    document.getElementById("clearHistory").addEventListener("click", () => {
      state.history = [];
      state.historyIndex = -1;
      drawHistory();
    });
    document.getElementById("toggleGesture").addEventListener("click", toggleGesture);

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    drawHistory();
  </script>
</body>
</html>
